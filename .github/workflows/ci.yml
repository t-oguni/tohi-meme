name: CI with pytest and schedule

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得する
        uses: actions/checkout@v5

      - name: Python をセットアップする
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストールする
        run: python -m pip install -r requirements.txt

      - name: 構文チェック
        run: python -m py_compile main.py

      - name: テスト実行
        run: pytest -q