name: Hello CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Say Hello
        run: |
          echo "Hello, Sato"
          echo "Github Actions. はじえあまんしあた。(始めました。)"

      - name: Show date
        run: echo "今日の日付： $(date)"
